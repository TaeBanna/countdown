<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  background: #0b0b10;
  color: #fff;
  font-family: 'Inter', sans-serif;
  overflow: hidden;
}

body::before {
  content:''; position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
  background-size: 80px 80px;
  pointer-events:none;
}

body::after {
  content:''; position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:600px; height:600px;
  background:radial-gradient(circle, rgba(255,255,255,.04) 0%, transparent 65%);
  pointer-events:none;
  animation: breathe 6s ease-in-out infinite;
}

.page {
  position:relative; z-index:1;
  width:100%; height:100vh;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:60px 16px 40px;
}

.ev-name {
  font-size: clamp(.75rem, 3vw, 1.1rem);
  font-weight: 300; letter-spacing: .28em;
  color: rgba(255,255,255,.5);
  text-transform: uppercase;
  margin-bottom: 12px; text-align: center;
  opacity:0; animation: up .7s .1s ease forwards;
}

.divline {
  width: 40px; height: 1px;
  background: rgba(255,255,255,.15);
  margin-bottom: clamp(20px, 5vh, 52px);
  opacity:0; animation: up .7s .2s ease forwards;
}

/* ── ALWAYS HORIZONTAL ROW ── */
.crow {
  display: flex;
  flex-direction: row;
  align-items: flex-end;
  justify-content: center;
  flex-wrap: nowrap;
  width: 100%;
  max-width: 1000px;
  opacity:0;
  animation: up .7s .3s ease forwards;
}

.unit {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1 1 0;
  min-width: 0;
}

/* Font scales with vw so 4 units ALWAYS fit */
.unit-num {
  font-family: 'DM Mono', monospace;
  font-size: clamp(2rem, 19vw, 10rem);
  font-weight: 500;
  color: #ffffff;
  line-height: 1;
  letter-spacing: -.03em;
  display: block;
  text-align: center;
  white-space: nowrap;
}

.unit-num.bump { animation: bump .18s ease; }

.unit-lbl {
  font-size: clamp(.52rem, 2.4vw, .78rem);
  font-weight: 500; letter-spacing: .14em;
  color: rgba(255,255,255,.5);
  text-transform: uppercase;
  margin-top: clamp(5px, 1.5vh, 12px);
  display: block;
}

.sep {
  font-family: 'DM Mono', monospace;
  font-size: clamp(1.5rem, 12vw, 6rem);
  font-weight: 300;
  color: rgba(255,255,255,.18);
  line-height: 1;
  flex-shrink: 0;
  align-self: flex-start;
  padding: 0 clamp(1px, 0.8vw, 10px);
  user-select: none;
}

.target-dt {
  margin-top: clamp(16px, 3.5vh, 40px);
  font-size: clamp(.65rem, 2.5vw, .88rem);
  font-weight: 300; letter-spacing: .16em;
  color: rgba(255,255,255,.3);
  text-transform: uppercase; text-align: center;
  opacity:0; animation: up .7s .5s ease forwards;
}

.progress {
  position: fixed; bottom:0; left:0; height: 2px;
  background: rgba(255,255,255,.35);
  transition: width 1s linear; width: 0%;
}

#done {
  display: none; position: fixed; inset:0; z-index:20;
  background: #0b0b10;
  flex-direction: column; align-items: center; justify-content: center; gap: 14px;
}
#done.show { display: flex; }

.done-ico { font-size: clamp(3rem, 10vw, 5rem); animation: bob 2s ease-in-out infinite; }
.done-name { font-size: clamp(1.6rem, 6vw, 3.5rem); font-weight: 600; color: #fff; letter-spacing: -.02em; text-align: center; padding: 0 20px; }
.done-sub { font-size: clamp(.75rem, 2vw, 1rem); color: rgba(255,255,255,.25); letter-spacing: .15em; text-align: center; }

.back-link {
  position: fixed; top:16px; left:16px; z-index:30;
  display: flex; align-items: center; gap: 6px;
  font-size: .73rem; font-weight: 500;
  color: rgba(255,255,255,.3);
  text-decoration: none; letter-spacing: .05em;
  padding: 7px 12px;
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 8px;
  background: rgba(255,255,255,.05);
  transition: all .15s;
}
.back-link:hover { color: rgba(255,255,255,.7); border-color: rgba(255,255,255,.2); }

@keyframes up { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
@keyframes bump { 0%{transform:scale(1)} 45%{transform:scale(1.07);color:rgba(255,255,255,.7)} 100%{transform:scale(1)} }
@keyframes breathe { 0%,100%{opacity:1} 50%{opacity:.4} }
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

/* Landscape compact */
@media(max-height:440px) and (orientation:landscape) {
  .unit-num { font-size: clamp(2rem, 13vh, 6rem); }
  .divline { margin-bottom: 10px; }
  .page { padding-top: 48px; }
}
</style>
</head>
<body>

<a class="back-link" href="index.html">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="15 18 9 12 15 6"/></svg>
  สร้าง countdown
</a>

<div class="page">
  <div class="ev-name" id="evName"></div>
  <div class="divline"></div>

  <div class="crow">
    <div class="unit">
      <span class="unit-num" id="days">00</span>
      <span class="unit-lbl">วัน</span>
    </div>
    <span class="sep">:</span>
    <div class="unit">
      <span class="unit-num" id="hours">00</span>
      <span class="unit-lbl">ชั่วโมง</span>
    </div>
    <span class="sep">:</span>
    <div class="unit">
      <span class="unit-num" id="mins">00</span>
      <span class="unit-lbl">นาที</span>
    </div>
    <span class="sep">:</span>
    <div class="unit">
      <span class="unit-num" id="secs">00</span>
      <span class="unit-lbl">วินาที</span>
    </div>
  </div>

  <div class="target-dt" id="targetDt"></div>
</div>

<div class="progress" id="prog"></div>

<div id="done">
  <div class="done-ico">🎉</div>
  <div class="done-name" id="doneName">ถึงวันสำคัญแล้ว!</div>
  <div class="done-sub">The moment has arrived</div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const name    = params.get('name') || '';
  const dateStr = params.get('date') || '';
  const timeStr = params.get('time') || '00:00';

  document.getElementById('evName').textContent = name || 'COUNTDOWN';
  if (name) document.title = name + ' — Countdown';

  let target = null, startTime = null;
  if (dateStr) {
    const [y,mo,da] = dateStr.split('-').map(Number);
    const [h,mi]    = timeStr.split(':').map(Number);
    target    = new Date(y, mo-1, da, h, mi, 0, 0);
    startTime = new Date();
    const lbl  = target.toLocaleDateString('th-TH', {year:'numeric',month:'long',day:'numeric'});
    const tlbl = (h===0&&mi===0) ? '' : ' · ' + String(h).padStart(2,'0') + ':' + String(mi).padStart(2,'0') + ' น.';
    document.getElementById('targetDt').textContent = lbl + tlbl;
  } else {
    document.getElementById('targetDt').textContent = 'ไม่ได้ระบุวันที่';
  }

  function pad(n){ return String(n).padStart(2,'0'); }

  function bump(id){
    const el=document.getElementById(id);
    el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
  }

  function setVal(id, val){
    const el=document.getElementById(id), nv=pad(val);
    if(el.textContent!==nv){ el.textContent=nv; bump(id); }
  }

  function tick(){
    if(!target) return;
    const now=new Date(), diff=target-now;
    if(startTime){
      const pct=Math.max(0,Math.min(100,((now-startTime)/(target-startTime))*100));
      document.getElementById('prog').style.width=pct+'%';
    }
    if(diff<=0){
      ['days','hours','mins','secs'].forEach(id=>document.getElementById(id).textContent='00');
      document.getElementById('doneName').textContent = name||'ถึงวันสำคัญแล้ว!';
      document.getElementById('done').classList.add('show');
      document.getElementById('prog').style.width='100%';
      clearInterval(iv); return;
    }
    const s=Math.floor(diff/1000);
    setVal('days',  Math.floor(s/86400));
    setVal('hours', Math.floor((s%86400)/3600));
    setVal('mins',  Math.floor((s%3600)/60));
    setVal('secs',  s%60);
  }

  tick();
  const iv = setInterval(tick, 1000);
</script>
</body>
</html>
